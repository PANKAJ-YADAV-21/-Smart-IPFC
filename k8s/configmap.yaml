apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ipfcms
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: ipfcms
data:
  APP_NAME: "IPFCMS"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://ipfcms.example.com"

  DB_CONNECTION: "mysql"
  DB_HOST: "ipfcms-db.xxxxxxxxxxxx.ap-south-1.rds.amazonaws.com"
  DB_PORT: "3306"
  DB_DATABASE: "ipfcms"
  DB_USERNAME: "ipfcms_user"

  CACHE_STORE: "file"
  SESSION_DRIVER: "file"
  QUEUE_CONNECTION: "database"
  LOG_CHANNEL: "stderr"

  MAIL_MAILER: "smtp"
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_ENCRYPTION: "tls"
  MAIL_FROM_ADDRESS: "noreply@ipfcms.com"
  MAIL_FROM_NAME: "IPFCMS"
